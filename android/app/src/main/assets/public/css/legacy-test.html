<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>VP550 Legacy CSS Test</title>
  <link rel="stylesheet" href="/css/legacy.css">
  <style>
    /* Fallback in case legacy.css doesn't have base body styles */
    body { margin: 0; }
  </style>
</head>
<body>
  <!-- Mimicking the Touchpoint Setup Page structure exactly -->
  <div class="min-h-screen bg-neutral-900 text-neutral-100 flex flex-col p-4 overflow-y-auto" style="font-family: sans-serif;">
    <div class="w-full max-w-md mx-auto my-auto shrink-0 bg-neutral-800 rounded-2xl shadow-2xl overflow-hidden border border-neutral-700">

      <!-- Header -->
      <div class="bg-neutral-950 p-6 flex flex-col items-center border-b border-neutral-800">
        <div class="h-16 w-16 bg-neutral-800 rounded-full flex items-center justify-center mb-4 border border-neutral-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="orange" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-white tracking-tight">Device Awaiting Configuration</h1>
        <p class="text-neutral-400 text-sm mt-1 text-center">Contact your administrator to provision this device</p>
      </div>

      <!-- Content -->
      <div class="p-8 space-y-6">
        <!-- Installation ID -->
        <div class="space-y-3">
          <label class="text-sm font-medium text-neutral-300 uppercase tracking-wider">Installation ID</label>
          <div class="relative">
            <input type="text" value="1771904169406-vpybh6huta" readonly
              class="w-full bg-neutral-950 border border-neutral-700 rounded-lg px-4 py-3 pr-12 text-white font-mono text-sm" style="background: rgba(5,5,5,0.5);">
          </div>
          <p class="text-xs text-neutral-500">Provide this ID to your administrator to configure this device.</p>
        </div>

        <!-- Status -->
        <div class="p-4 border rounded-lg flex items-start space-x-3" style="background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2);">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-400 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <div class="text-sm" style="color: #fde68a;">
            <p class="font-semibold mb-1">Device Not Configured</p>
            <p style="color: rgba(253,230,138,0.8);">This device must be provisioned by an admin before it can be used as a Terminal or Kiosk.</p>
          </div>
        </div>

        <!-- Button -->
        <button class="w-full text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center space-x-2" style="background: #059669;">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          <span>Check Configuration</span>
        </button>
      </div>

      <!-- Footer -->
      <div class="p-4 border-t border-neutral-800 flex justify-center" style="background: rgba(5,5,5,0.5);">
        <p class="text-neutral-600 text-xs uppercase tracking-widest font-semibold">Touchpoint Provisioning Required</p>
      </div>

    </div>
  </div>
</body>
</html>
